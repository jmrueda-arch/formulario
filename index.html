<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Premium Experience</title>
    <!-- Google Fonts para una tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h2>Bienvenido</h2>
            <p>Por favor completa tus datos para registrarte.</p>
            
            <form id="registroForm">
                <div class="input-group">
                    <label for="Nombre">Nombre</label>
                    <input type="text" id="Nombre" name="Nombre" required placeholder="Tu nombre">
                </div>
                
                <div class="input-group">
                    <label for="Apellido">Apellido</label>
                    <input type="text" id="Apellido" name="Apellido" required placeholder="Tu apellido">
                </div>
                
                <div class="input-group">
                    <label for="Correo">Correo Electrónico</label>
                    <input type="email" id="Correo" name="Correo" required placeholder="tu@email.com">
                </div>
                
                <div class="input-group">
                    <label for="Celular">Celular</label>
                    <!-- Usamos type="tel" para que en móviles salga el teclado numérico -->
                    <input type="tel" id="Celular" name="Celular" required placeholder="+57 300 000 0000">
                </div>
                
                <button type="submit" id="submitBtn">
                    <span class="btn-text">Registrar mis datos</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="successMessage" class="message success hidden">¡Registro enviado con éxito! 😊</div>
            <div id="errorMessage" class="message error hidden">Hubo un error de conexión, intenta nuevamente.</div>
        </div>
    </div>

    <!-- Cargar la lógica en Javascript -->
    <script src="script.js"></script>
</body>
</html>
